server:
    # Porta que o Unbound escuta (Pi-hole usa 5335 para evitar conflito)
    port: 5335

    # Escutar apenas loopback (Pi-hole está na mesma máquina)
    interface: 127.0.0.1

    # Protocolo
    do-ip4: yes
    do-udp: yes
    do-tcp: yes

    # IPv6 — desabilitar se não usar
    do-ip6: no

    # Não usar como servidor autoritativo
    do-auth: no

    # Prefetch popular records antes de expirarem (melhora latência)
    prefetch: yes

    # Prefetch chaves DNSSEC
    prefetch-key: yes

    # Cache de respostas negativas
    neg-cache-size: 4m

    # Número de threads (hardware modesto)
    num-threads: 1

    # Tamanho do cache — reduzido para hardware com menos RAM
    msg-cache-size: 20m
    rrset-cache-size: 40m
    cache-min-ttl: 3600
    cache-max-ttl: 86400

    # Limite de consultas simultâneas
    num-queries-per-thread: 2048
    outgoing-range: 4096

    # Tamanho do buffer UDP
    so-rcvbuf: 1m

    # Endereços privados
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

    # Domínios privados
    private-domain: "home"
    private-domain: "lan"
    private-domain: "local"

    # Segurança
    deny-any: yes
    harden-dnssec-stripped: yes
    harden-glue: yes
    harden-referral-path: yes
    harden-below-nxdomain: yes
    harden-large-queries: yes
    hide-identity: yes
    hide-version: yes
    val-bogus-ttl: 60

    # Log mínimo
    verbosity: 0

    # Chave DNSSEC
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # Acesso apenas loopback
    access-control: 127.0.0.1/32 allow
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse
