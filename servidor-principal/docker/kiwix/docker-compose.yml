services:
  kiwix:
    image: ghcr.io/kiwix/kiwix-tools:latest
    container_name: kiwix
    restart: unless-stopped
    ports:
      - "18181:80"
    volumes:
      - /opt/kiwix/zim:/data/zim:ro
      - /opt/kiwix/data:/data
    command: >
      sh -lc '
      if ls /data/zim/*.zim >/dev/null 2>&1; then
        kiwix-manage /data/library.xml add /data/zim/*.zim;
        exec kiwix-serve --port=80 --library /data/library.xml;
      else
        echo "Nenhum .zim em /data/zim. Baixe um arquivo .zim e reinicie.";
        exec sh -c "sleep infinity";
      fi
      '
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    labels:
      com.centurylinklabs.watchtower.enable: "true"
