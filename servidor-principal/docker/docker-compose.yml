---
# =============================================================
# Home Stack — Docker Compose
# Copiar .env.example para .env antes de subir
# docker compose up -d
# =============================================================

networks:
  homelab:
    external: true  # criar com: docker network create homelab

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:
  portainer_data:
  npm_data:
  npm_letsencrypt:

services:

  # -------------------------------------------------------
  # Nginx Proxy Manager — Proxy reverso + SSL
  # -------------------------------------------------------
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"      # Admin UI
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - homelab

  # -------------------------------------------------------
  # Portainer — Gestão de containers
  # -------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - homelab

  # -------------------------------------------------------
  # PostgreSQL — Banco de dados
  # -------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homelab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------------
  # Prometheus — Coleta de métricas
  # -------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - homelab

  # -------------------------------------------------------
  # Node Exporter — Métricas do host
  # -------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - homelab

  # -------------------------------------------------------
  # cAdvisor — Métricas de containers
  # -------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - homelab

  # -------------------------------------------------------
  # Grafana — Dashboards
  # -------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_DOMAIN: ${GF_SERVER_DOMAIN}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - homelab
    depends_on:
      - prometheus

  # -------------------------------------------------------
  # Homepage — Dashboard de serviços
  # -------------------------------------------------------
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homelab

  # -------------------------------------------------------
  # Navidrome — Servidor de música
  # -------------------------------------------------------
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    ports:
      - "4533:4533"
    environment:
      ND_MUSICFOLDER: /music
      ND_DATAFOLDER: /data
      ND_BASEURL: ${ND_BASEURL}
      ND_LOGLEVEL: ${ND_LOGLEVEL}
      ND_SESSIONTIMEOUT: ${ND_SESSIONTIMEOUT}
    volumes:
      - ${DATA_DIR}/navidrome/data:/data
      - ${DATA_DIR}/navidrome/music:/music:ro
    networks:
      - homelab

  # -------------------------------------------------------
  # Plex — Servidor de mídia
  # -------------------------------------------------------
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    network_mode: host   # necessário para descoberta automática
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      VERSION: docker
      PLEX_CLAIM: ${PLEX_CLAIM}
    volumes:
      - ${DATA_DIR}/plex/config:/config
      - ${DATA_DIR}/plex/tv:/tv
      - ${DATA_DIR}/plex/movies:/movies
      - ${DATA_DIR}/plex/music:/music

  # -------------------------------------------------------
  # qBittorrent — Cliente BitTorrent
  # -------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - "8090:8090"    # WebUI
      - "6881:6881"    # BitTorrent TCP
      - "6881:6881/udp"
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: ${WEBUI_PORT}
    volumes:
      - ${DATA_DIR}/qbittorrent/config:/config
      - ${DATA_DIR}/qbittorrent/downloads:/downloads
    networks:
      - homelab

  # -------------------------------------------------------
  # Mosquitto — Broker MQTT
  # -------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT
      - "9001:9001"    # WebSocket
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ${DATA_DIR}/mosquitto/data:/mosquitto/data
      - ${DATA_DIR}/mosquitto/log:/mosquitto/log
    networks:
      - homelab

  # -------------------------------------------------------
  # Kiwix — Conteúdo offline (Wikipedia, etc.)
  # -------------------------------------------------------
  kiwix:
    image: ghcr.io/kiwix/kiwix-tools:latest
    container_name: kiwix
    restart: unless-stopped
    ports:
      - "8888:8888"
    command: kiwix-serve --library /data/library.xml
    volumes:
      - ${KIWIX_DATA_DIR}:/data
    networks:
      - homelab

  # -------------------------------------------------------
  # Minecraft — Servidor de jogo
  # -------------------------------------------------------
  minecraft:
    image: itzg/minecraft-server:java8
    container_name: minecraft
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      EULA: ${EULA}
      TYPE: ${MC_TYPE}
      VERSION: ${MC_VERSION}
      MEMORY: ${MC_MEMORY}
      SERVER_NAME: ${MC_SERVER_NAME}
      TZ: ${TZ}
    volumes:
      - ${DATA_DIR}/minecraft:/data
    networks:
      - homelab
    stdin_open: true
    tty: true

  # -------------------------------------------------------
  # Watchtower — Atualização automática de imagens
  # -------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      WATCHTOWER_SCHEDULE: ${WATCHTOWER_SCHEDULE}
      WATCHTOWER_CLEANUP: ${WATCHTOWER_CLEANUP}
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL}
      WATCHTOWER_NOTIFICATIONS_LEVEL: info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - homelab
