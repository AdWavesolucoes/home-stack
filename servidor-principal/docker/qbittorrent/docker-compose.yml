services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Sao_Paulo
      WEBUI_PORT: "8081"
    volumes:
      - ./config:/config
      - /mnt/B0CEF741CEF6FE82/media/downloads:/downloads
    ports:
      - "8081:8081"
      - "6881:6881"
      - "6881:6881/udp"
    labels:
      com.centurylinklabs.watchtower.enable: "true"
