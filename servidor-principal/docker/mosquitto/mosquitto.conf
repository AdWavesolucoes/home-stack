# =============================================================
# Mosquitto MQTT Broker — Configuração
# =============================================================

# Listener MQTT padrão
listener 1883
protocol mqtt

# Listener WebSocket (para dashboards web como Node-RED, Home Assistant)
listener 9001
protocol websockets

# Persistência de mensagens
persistence true
persistence_location /mosquitto/data/

# Log
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Autenticação
# Sem autenticação (apenas para rede local isolada):
allow_anonymous true

# COM autenticação (recomendado se exposto externamente):
# allow_anonymous false
# password_file /mosquitto/config/passwd
# Para criar o arquivo de senha:
# docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/passwd usuario

# Limite de conexões
max_connections 100

# Tamanho máximo de payload em bytes (0 = ilimitado)
message_size_limit 0

# Manter conexão (keep alive em segundos)
keepalive_interval 60
