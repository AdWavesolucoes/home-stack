global:
  scrape_interval: 15s          # Coletar métricas a cada 15s
  evaluation_interval: 15s      # Avaliar regras a cada 15s
  scrape_timeout: 10s

# Arquivo de regras de alertas (opcional)
# rule_files:
#   - /etc/prometheus/rules/*.yml

# Configuração do Alertmanager (opcional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:

  # Métricas do próprio Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Métricas do host (Node Exporter)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "servidor-principal"

  # Métricas de containers (cAdvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "servidor-principal"

  # Pi-hole (requer pihole-exporter ou FTL metrics)
  # Instalar: https://github.com/eko/pihole-exporter
  # - job_name: "pihole"
  #   static_configs:
  #     - targets: ["localhost:9617"]
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       replacement: "pihole-principal"

  # Orange Pi — Node Exporter remoto
  # Adicionar após instalar node-exporter no Orange Pi
  # - job_name: "node-exporter-orangepi"
  #   static_configs:
  #     - targets: ["192.168.1.11:9100"]
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: instance
  #       replacement: "orange-pi"

  # Unbound (opcional)
  # Requer unbound_exporter: https://github.com/letsencrypt/unbound_exporter
  # - job_name: "unbound"
  #   static_configs:
  #     - targets: ["localhost:9167"]
