services:
  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "FORGE"
      VERSION: "1.16.5"
      FORGE_VERSION: "36.2.39"
      MEMORY: "6G"
      ONLINE_MODE: "FALSE"
      USE_AIKAR_FLAGS: "true"
    volumes:
      - /opt/minecraft:/data
