server:
    # Porta que o Unbound escuta (Pi-hole usa 5335 para evitar conflito)
    port: 5335

    # Escutar apenas loopback (Pi-hole está na mesma máquina)
    interface: 127.0.0.1

    # Protocolo
    do-ip4: yes
    do-udp: yes
    do-tcp: yes

    # IPv6 — desabilitar se não usar
    do-ip6: no

    # Não usar como servidor autoritativo
    do-auth: no

    # Prefetch popular records antes de expirarem (melhora latência)
    prefetch: yes

    # Prefetch chaves DNSSEC
    prefetch-key: yes

    # Cache de respostas negativas
    neg-cache-size: 4m

    # Número de threads (1 para hardware modesto, aumentar se necessário)
    num-threads: 1

    # Tamanho do cache (ajustar conforme RAM disponível)
    msg-cache-size: 50m
    rrset-cache-size: 100m
    cache-min-ttl: 3600
    cache-max-ttl: 86400

    # Limite de consultas simultâneas por thread
    num-queries-per-thread: 4096
    outgoing-range: 8192

    # Tamanho do buffer UDP
    so-rcvbuf: 1m

    # Endereço de rede privada — não resolver para fora
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

    # Segurança: rejeitar registros A/AAAA em espaços privados vindo de DNS público
    private-domain: "home"
    private-domain: "lan"
    private-domain: "local"

    # Proteger contra DNS rebinding
    deny-any: yes

    # DNSSEC
    harden-dnssec-stripped: yes
    harden-glue: yes
    harden-referral-path: yes
    harden-below-nxdomain: yes
    harden-large-queries: yes

    # Randomização de porta para segurança
    use-caps-for-id: no

    # Esconder versão do software
    hide-identity: yes
    hide-version: yes

    # Mínimo TTL para respostas negativas (NXDOMAIN)
    val-bogus-ttl: 60

    # Log — apenas erros (0 = sem log, 1 = erros, 2 = queries)
    verbosity: 0

    # Arquivo de hints (servidores raiz)
    # Atualizar periodicamente com: unbound-anchor -a /var/lib/unbound/root.key
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # Limitar acesso à interface loopback
    access-control: 127.0.0.1/32 allow
    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse
